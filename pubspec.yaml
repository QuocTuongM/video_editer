name: pro_video_editor_example
description: "Demonstrates how to use the pro_video_editor plugin."
publish_to: 'none'

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.0.7

  pro_video_editor:
    path: ../

  intl: ^0.20.1
  cupertino_icons: ^1.0.8

  pro_image_editor: ^12.0.11

  google_fonts: ^6.3.2
  flutter_colorpicker: ^1.1.0
  mime: ^2.0.0
  wav: 1.5.0

  path_provider: ^2.1.5
  video_player: ^2.9.3
  audioplayers: ^5.2.1

  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # File picker
  file_picker: ^10.2.1

  # HTTP cho Gemini API
  http: ^1.2.0

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/tests/